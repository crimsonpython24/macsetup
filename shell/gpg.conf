# ─── ~/.gnupg/gpg.conf ────────────────────────────────────────────────────────
# Hardened GnuPG configuration.
# Targets GnuPG ≥ 2.4 (MacPorts gnupg2). Companion files in this directory:
#   gpg-agent.conf — passphrase cache, pinentry, ssh-agent toggles
#   dirmngr.conf   — keyserver and network behavior
#
# Some options below (use-ocb-sym, default-new-key-algo with cv25519) are
# 2.4+ only and silently ignored on older builds.
# ──────────────────────────────────────────────────────────────────────────────

# ─── I/O & display ────────────────────────────────────────────────────────────
charset utf-8
display-charset utf-8
use-agent
no-greeting
fixed-list-mode
no-comments
no-emit-version
armor

# ─── Listing / fingerprinting ─────────────────────────────────────────────────
keyid-format 0xlong
with-fingerprint
with-subkey-fingerprint
with-key-origin
list-options show-uid-validity
verify-options show-uid-validity

# ─── Algorithm preferences ────────────────────────────────────────────────────
# personal-* governs what *we* prefer; default-preference-list is what we
# advertise on newly generated keys for *others* encrypting to us.
personal-cipher-preferences AES256 AES192 AES
personal-digest-preferences SHA512 SHA384 SHA256
personal-compress-preferences ZLIB BZIP2 ZIP Uncompressed
default-preference-list SHA512 SHA384 SHA256 AES256 AES192 AES ZLIB BZIP2 ZIP Uncompressed
cert-digest-algo SHA512

# Symmetric (-c) operations: uncomment to prefer OCB AEAD mode over legacy
# CFB+MDC. Requires GnuPG ≥ 2.5.19; older builds error on this directive.
# use-ocb-sym

# ─── Passphrase / S2K hardening ───────────────────────────────────────────────
s2k-mode 3
s2k-digest-algo SHA512
s2k-cipher-algo AES256
s2k-count 65011712
no-symkey-cache

# ─── Weak-crypto refusal ──────────────────────────────────────────────────────
weak-digest SHA1
weak-digest RIPEMD160
disable-cipher-algo 3DES
disable-cipher-algo IDEA
disable-cipher-algo CAST5
disable-cipher-algo BLOWFISH
disable-pubkey-algo DSA
disable-pubkey-algo ELGAMAL
require-cross-certification
require-secmem
# RSA below 3072 bits is rejected outright. Raise to 4096 if you do not
# need to verify older third-party signatures sitting in your keyring.
min-rsa-length 3072

# ─── Privacy ──────────────────────────────────────────────────────────────────
throw-keyids
# Upstream advice: prefer the full 40-char fingerprint over a long keyID, and
# append "!" to bind the directive to that exact key (suppresses GnuPG's
# subkey-substitution heuristic). The values below are abbreviated for
# brevity — replace with the fingerprint of *your* primary key, e.g.
#   default-key  ABCDEF0123456789ABCDEF0123456789ABCDEF01!
default-key 0xD67D4AFF6AABD063
trusted-key 0xD67D4AFF6AABD063
default-recipient-self

# ─── Key generation defaults ──────────────────────────────────────────────────
# Prefer modern Curve25519 over RSA for any key created from now on.
# Cert+sign on the primary, encryption on a separate subkey.
default-new-key-algo "ed25519/cert,sign+cv25519/encr"
# Always prompt for the certification level when signing other people's
# keys — avoids the silent "level 0 / no claim" sigs that --quick-sign-key
# produces by default.
ask-cert-level

# ─── Import / export hygiene ──────────────────────────────────────────────────
import-options import-clean import-minimal
export-options export-clean export-minimal

# ─── Offline / email verification (signature-embedded keys) ───────────────────
# include-key-block embeds a stripped copy of the signing key as a subpacket
# inside every data signature we make. Recipients can then verify (and
# reply-encrypt to us) without a keyserver round-trip — useful for
# air-gapped reviewers, mailing-list traffic, and anyone we sign for who
# may not be running auto-key-locate against a server we trust.
include-key-block
# auto-key-import handles the receiving side: when we verify an inbound
# signature whose signer carries a key block, GnuPG silently imports it
# into our keyring. import-clean / import-minimal above keep the imported
# copy stripped to just self-signatures and the primary UID, so the
# keyring doesn't bloat with foreign certifications.
auto-key-import

# ─── Keyserver & key-discovery policy ─────────────────────────────────────────
# keyserver lives here for backwards compat; dirmngr.conf is the modern home.
keyserver hkps://keys.openpgp.org
keyserver-options no-honor-keyserver-url include-revoked no-include-attributes timeout=10
no-auto-key-retrieve
auto-key-locate local

# ─── Trust model ──────────────────────────────────────────────────────────────
trust-model tofu+pgp
tofu-default-policy unknown
completes-needed 2
marginals-needed 5
max-cert-depth 3
no-auto-check-trustdb

# ─── Knobs to flip while debugging (leave commented in steady state) ──────────
# verbose
# list-options show-unusable-subkeys
# group keygroup = 0xFF00000000000003 0xFF00000000000002 0xFF00000000000001
# # Require pinentry on every signature (paranoid; very chatty for git):
# (set ignore-cache-for-signing in gpg-agent.conf, not here)
