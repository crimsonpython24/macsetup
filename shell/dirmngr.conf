# ─── ~/.gnupg/dirmngr.conf ────────────────────────────────────────────────────
# Hardened dirmngr configuration. dirmngr is the network-facing component
# of GnuPG (keyserver, OCSP, CRL, WKD lookups). gpg.conf retains a duplicate
# `keyserver` line for older tools that read it directly.
#
# After editing, reload the daemon:
#   gpg-connect-agent --dirmngr reloaddirmngr /bye
# ──────────────────────────────────────────────────────────────────────────────

# ─── Keyserver ────────────────────────────────────────────────────────────────
# keys.openpgp.org refuses third-party signatures and requires email
# verification — much smaller poisoning surface than the SKS gossip pool.
keyserver hkps://keys.openpgp.org

# ─── Network surface area ─────────────────────────────────────────────────────
# We only ever talk HKPS. Disable LDAP entirely and ignore any LDAP/HTTP
# CRL distribution points embedded in imported certs.
disable-ldap
ignore-ldap-dp
ignore-http-dp
# OCSP requests leak which certs we are validating to the responder; off
# unless you specifically need it.
# allow-ocsp

# ─── DNS / Tor ────────────────────────────────────────────────────────────────
# Use the system resolver (libc) instead of the bundled one. Avoids a
# second DNS code path with its own bug surface, and respects /etc/hosts.
standard-resolver
# Tor opt-in is explicit; flipping use-tor here without a running tor daemon
# breaks all keyserver traffic, so leave it off unless you mean it.
no-use-tor

# ─── Timeouts ─────────────────────────────────────────────────────────────────
# Default connect-timeout is 15 s, resolver 30 s — too patient for an
# interactive `git commit -S` flow that's blocking on key refresh.
connect-timeout 10
resolver-timeout 10
ldaptimeout 10

# ─── Anti-flood ───────────────────────────────────────────────────────────────
# Cap the number of keys returned per query so a hostile keyserver can't
# blow up our keyring with a flood of certifications.
max-replies 5

# ─── Misc ─────────────────────────────────────────────────────────────────────
# Phone home for "you're running an outdated GnuPG" messages. Leak: dirmngr
# discloses our IP to versions.gnupg.org. Comment out if that matters.
allow-version-check
