# ─── ~/.gnupg/gpg-agent.conf ──────────────────────────────────────────────────
# Hardened gpg-agent configuration. Path expectations match a MacPorts install:
#   pinentry-program → /opt/local/bin/pinentry-mac
# Adjust to /opt/homebrew/bin/pinentry-mac on Homebrew, or wherever your
# pinentry-mac actually lives (`which pinentry-mac`).
#
# After editing, reload the agent:
#   gpg-connect-agent reloadagent /bye
# ──────────────────────────────────────────────────────────────────────────────

# ─── Cache lifetimes (seconds) ────────────────────────────────────────────────
# Idle TTL for cached passphrases — 10 min for OpenPGP, 30 min for SSH.
default-cache-ttl 600
default-cache-ttl-ssh 1800
# Hard ceilings regardless of activity — 1 h OpenPGP, 2 h SSH.
max-cache-ttl 3600
max-cache-ttl-ssh 7200

# ─── Cache-bypass / external-cache lockdown ───────────────────────────────────
# Block pinentry from cooperating with platform credential stores (macOS
# Keychain, GNOME Keyring, KWallet) — the agent is the source of truth.
no-allow-external-cache
# Refuse loopback pinentry: programmatic clients cannot supply the passphrase
# over the assuan channel. Stops scripted exfiltration of cached keys.
no-allow-loopback-pinentry
# Refuse the "ALLOW MARK TRUSTED" assuan command. Prevents a misbehaving
# tool from silently elevating an arbitrary key into trustlist.txt.
no-allow-mark-trusted

# ─── Pinentry ─────────────────────────────────────────────────────────────────
pinentry-program /opt/local/bin/pinentry-mac

# ─── SSH integration ──────────────────────────────────────────────────────────
# Force SHA-256 over MD5 when the agent prints SSH key fingerprints.
ssh-fingerprint-digest SHA256
# enable-ssh-support is OFF here — macOS's ssh-agent already handles SSH
# keys, and running both confuses ssh-add. Uncomment only if you want gpg-
# agent to be your SSH agent (and remove the macOS launchd ssh-agent).
# enable-ssh-support

# ─── Passphrase policy (applied at key generation / change) ───────────────────
enforce-passphrase-constraints
min-passphrase-len 12
min-passphrase-nonalpha 2

# ─── Logging ──────────────────────────────────────────────────────────────────
# Useful for diagnosing pinentry / smartcard hangs. Comment out if you want
# zero on-disk traces of agent activity.
log-file ~/.gnupg/gpg-agent.log

# ─── Knobs to flip while debugging (leave commented in steady state) ──────────
# Force pinentry on every signature — defeats cache entirely. Recommended
# if you sign with a long-lived primary key from a non-smartcard source.
# ignore-cache-for-signing
# debug-pinentry
# verbose
